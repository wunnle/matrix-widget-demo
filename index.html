<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matrix Widget Demo</title>
  <style>
    :root {
      --bg: #10131a;
      --panel: #171c26;
      --text: #e8ecf3;
      --muted: #9aa4b2;
      --border: #2b3445;
      --green: #0dbd8b;
      --blue: #4f8cff;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #0d1016, #111722);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(100%, 430px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .head strong { display: block; font-size: 15px; }
    .head span { color: var(--muted); font-size: 12px; }
    .badge {
      background: rgba(79,140,255,.16);
      color: #bcd2ff;
      border: 1px solid rgba(79,140,255,.25);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      white-space: nowrap;
    }
    .body { padding: 16px; display: grid; gap: 14px; }
    .bubble, .box {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.03);
    }
    .sender {
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .chips { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      appearance: none;
      border: 1px solid #38517a;
      background: rgba(79,140,255,.14);
      color: var(--text);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button.primary {
      background: rgba(13,189,139,.14);
      border-color: rgba(13,189,139,.3);
    }
    .status, .log {
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }
    code {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 2px 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div>
        <strong>Matrix widget prototype</strong>
        <span>Two buttons. Two messages. No decorative nonsense.</span>
      </div>
      <div class="badge">real-ish</div>
    </div>

    <div class="body">
      <div class="bubble">
        <div class="sender">Bender</div>
        <div>
          Fallback for normal clients: reply with <code>approve</code> or <code>details</code>.
        </div>
      </div>

      <div class="box">
        <div class="chips">
          <button class="primary" id="approveBtn">Approve</button>
          <button id="detailsBtn">Details</button>
        </div>
      </div>

      <div class="box">
        <strong>Status</strong>
        <div class="status" id="status">Starting widget…</div>
      </div>

      <div class="box">
        <strong>Log</strong>
        <div class="log" id="log">Waiting for trouble.</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/matrix-widget-api@0.1.0/dist/api.min.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const approveBtn = document.getElementById('approveBtn');
    const detailsBtn = document.getElementById('detailsBtn');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function log(text) {
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      logEl.textContent = `[${now}] ${text}\n\n` + logEl.textContent;
    }

    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        widgetId: params.get('widgetId') || params.get('widget_id') || params.get('id') || null,
        parentUrl: params.get('parentUrl') || '*',
      };
    }

    const params = getParams();
    let widgetApi = null;
    let widgetReady = false;

    function sendMessage(body) {
      if (!widgetApi) {
        return Promise.reject(new Error('Widget API not initialized'));
      }
      if (!widgetReady) {
        return Promise.reject(new Error('Widget is not ready yet'));
      }
      if (typeof widgetApi.sendRoomEvent !== 'function') {
        return Promise.reject(new Error('sendRoomEvent is unavailable on this widget API instance'));
      }

      return widgetApi.sendRoomEvent('m.room.message', {
        msgtype: 'm.text',
        body,
      });
    }

    function init() {
      try {
        log(`Location search: ${window.location.search || '(empty)'}`);
        log(`Detected widgetId: ${params.widgetId || '(missing)'}`);
        log(`Parent origin hint: ${params.parentUrl}`);

        if (!window.mxwidgets || !window.mxwidgets.WidgetApi) {
          throw new Error('mxwidgets global not found');
        }

        const targetOrigin = '*';
        widgetApi = new window.mxwidgets.WidgetApi(params.widgetId, targetOrigin);
        log(`WidgetApi created with widgetId: ${params.widgetId || '(null)'}`);

        if (window.mxwidgets.MatrixCapabilities) {
          if (window.mxwidgets.MatrixCapabilities.SendEvent) {
            widgetApi.requestCapability(window.mxwidgets.MatrixCapabilities.SendEvent);
            log('Requested capability: SendEvent');
          }
          if (window.mxwidgets.MatrixCapabilities.SendMessage) {
            widgetApi.requestCapability(window.mxwidgets.MatrixCapabilities.SendMessage);
            log('Requested capability: SendMessage');
          }
        }

        if (window.mxwidgets.WidgetEventCapability && window.mxwidgets.EventDirection) {
          try {
            const cap = window.mxwidgets.WidgetEventCapability.forRoomEvent(
              window.mxwidgets.EventDirection.Send,
              'm.room.message',
              undefined,
            ).raw;
            widgetApi.requestCapability(cap);
            log(`Requested explicit room-event capability: ${cap}`);
          } catch (err) {
            log(`Explicit room-event capability request failed to build: ${err.message}`);
          }
        }

        widgetApi.on('ready', function () {
          widgetReady = true;
          setStatus(`Widget ready. widgetId=${params.widgetId || '(missing)'}`);
          log('Received ready event from host client');

          try {
            if (typeof widgetApi.hasCapability === 'function' && window.mxwidgets.MatrixCapabilities) {
              const checks = [];
              if (window.mxwidgets.MatrixCapabilities.SendEvent) {
                checks.push(`has SendEvent = ${widgetApi.hasCapability(window.mxwidgets.MatrixCapabilities.SendEvent)}`);
              }
              if (window.mxwidgets.MatrixCapabilities.SendMessage) {
                checks.push(`has SendMessage = ${widgetApi.hasCapability(window.mxwidgets.MatrixCapabilities.SendMessage)}`);
              }
              if (checks.length) log(checks.join(' | '));
            }
          } catch (err) {
            log(`Capability inspection failed: ${err.message}`);
          }
        });

        widgetApi.start();
        setStatus('Started widget API. Waiting for ready event…');
        log('widgetApi.start() called');
      } catch (err) {
        setStatus('Widget API failed to initialize. Open this inside a Matrix widget-capable client, not just a plain browser tab.');
        log(`Init error: ${err.message}`);
      }
    }

    approveBtn.addEventListener('click', function () {
      log('Approve clicked. Trying to send: approve');
      sendMessage('approve')
        .then(function () {
          log('Sent message: approve');
        })
        .catch(function (err) {
          log(`Approve failed: ${err.message}`);
        });
    });

    detailsBtn.addEventListener('click', function () {
      log('Details clicked. Trying to send: details');
      sendMessage('details')
        .then(function () {
          log('Sent message: details');
        })
        .catch(function (err) {
          log(`Details failed: ${err.message}`);
        });
    });

    init();
  </script>
</body>
</html>
